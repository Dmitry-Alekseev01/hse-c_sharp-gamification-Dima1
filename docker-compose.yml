services:
  postgres:
    image: postgres:16
    env_file:
      - ./Backend/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build:
      context: ./Backend
      dockerfile: docker/app.Dockerfile
    env_file:
      - ./Backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./Backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./Backend
      dockerfile: docker/app.Dockerfile
    env_file:
      - ./Backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./Backend:/app
    command: ["python", "-u", "-m", "app.tasks.worker"]

  frontend:
    build:
      context: ./Frontend/c-s-game
      dockerfile: dockerfile
    env_file:
      - ./infra/env/frontend.dev.env
    volumes:
      - ./Frontend/c-s-game:/app
      - /app/node_modules
    command: ["npm", "start"]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
