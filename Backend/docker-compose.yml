services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: ["python", "-u", "-m", "app.tasks.worker"]

volumes:
  pgdata:
